services:
  blog:
    image: ${DOCKER_IMAGE:-blog-local:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - PORT=8080
      - DB_PATH=/app/data/blog.db
      - FRONTEND_DIR=/app/frontend
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:?ADMIN_PASS is required}
    volumes:
      - ./data:/app/data
      - ./frontend:/app/frontend:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/posts"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
