# 发布流程：打 tag 后自动构建 Docker 镜像并推送到 Docker Hub
#
# 使用前配置（GitHub 仓库 Settings → Secrets and variables → Actions）：
#   DOCKERHUB_USERNAME  你的 Docker Hub 用户名
#   DOCKERHUB_TOKEN     Docker Hub Access Token
#                       （Docker Hub → Account Settings → Security → New Access Token）
#
# 发布新版本：
#   git tag v1.0.0
#   git push origin v1.0.0
#
# 构建产物：
#   yourname/blog:v1.0.0   指定版本
#   yourname/blog:latest   最新版本

name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # 匹配 v1.0.0, v2.1.3 等

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image=${{ secrets.DOCKERHUB_USERNAME }}/blog" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: Release ${{ steps.meta.outputs.version }}
          body: |
            ## 部署方式

            ### Docker 一键部署（推荐）
            ```bash
            git clone <repo-url>
            cd blog
            cp .env.example .env
            # 编辑 .env 设置密码
            DOCKER_IMAGE=${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }} ./deploy.sh
            ```

            ### 拉取镜像
            ```bash
            docker pull ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ```

            ### 更新已有部署
            ```bash
            ./deploy.sh update
            ```
          draft: false
          prerelease: false
