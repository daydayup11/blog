<!DOCTYPE html>
<html data-theme="dark" lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">个人主页</title>
  <script>(function(){var t=localStorage.getItem('blog-theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="/css/theme-dark.css">
  <link rel="stylesheet" href="/css/theme-light.css">
  <link rel="stylesheet" href="/css/common.css">
</head>
<body>
  <div id="nav-root"></div>

  <main class="page">
    <!-- Hero -->
    <section class="hero" id="hero-section">
      <div class="loading">加载中...</div>
    </section>

    <!-- Experience Timeline -->
    <section style="margin-bottom:40px" id="timeline-section" style="display:none">
      <div class="section-title">经历</div>
      <div class="timeline" id="timeline-list"></div>
    </section>

    <!-- Featured Projects -->
    <section style="margin-bottom:40px">
      <div class="section-title">精选项目</div>
      <div class="grid-3" id="featured-projects"><div class="loading">加载中...</div></div>
    </section>

    <!-- Latest Posts -->
    <section style="margin-bottom:40px">
      <div class="section-title">最新文章</div>
      <div id="latest-posts"><div class="loading">加载中...</div></div>
    </section>

    <!-- Contact -->
    <section style="margin-bottom:40px" id="contact-section">
      <div class="section-title">联系我</div>
      <div id="contact-links" style="display:flex;gap:12px;flex-wrap:wrap"></div>
    </section>
  </main>

  <script type="module">
    import { renderNav, renderBadges, getApi } from '/js/components.js';
    import '/js/theme.js';

    document.getElementById('nav-root').innerHTML = renderNav('index');

    const api = await getApi();
    api.trackPage(location.pathname, document.referrer);

    function safeJSON(str, fallback = []) {
      try { return JSON.parse(str) || fallback; } catch { return fallback; }
    }

    function badgeClass(skill) {
      const map = { Go: 'badge-go', Java: 'badge-java', Python: 'badge-python', Docker: 'badge-docker' };
      return map[skill] || 'badge-other';
    }

    // Load profile and dynamic content in parallel
    const [profile, { projects }, { posts }] = await Promise.all([
      api.getProfile().catch(() => ({})),
      api.getProjects(),
      api.getPosts({ page: 1 }),
    ]);

    // ── Hero ──────────────────────────────────────────────────────
    const name     = profile.name     || '戴宇彤';
    const subtitle = profile.subtitle || 'Full-stack Developer';
    const bio      = profile.bio      || '';
    const skills   = safeJSON(profile.skills,  ['Go', 'Java', 'Python', 'Docker']);
    const social   = safeJSON(profile.social,  []);
    const timeline = safeJSON(profile.timeline,[]);

    document.title = `${name} | 个人主页`;

    document.getElementById('hero-section').innerHTML = `
      <h1 class="hero-name">Hi, I'm <span>${name}</span> 👋</h1>
      <p class="hero-sub">${subtitle}</p>
      ${bio ? `<p style="color:var(--text-secondary);margin-top:8px;font-size:15px">${bio}</p>` : ''}
      ${skills.length ? `
        <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">
          ${skills.map(s => `<span class="badge ${badgeClass(s)}">${s}</span>`).join('')}
        </div>` : ''}
      ${social.length ? `
        <div class="hero-links">
          ${social.map(s => `<a class="hero-link" href="${s.url}" target="_blank">${s.icon || ''} ${s.label}</a>`).join('')}
        </div>` : ''}`;

    // ── Timeline ──────────────────────────────────────────────────
    if (timeline.length) {
      document.getElementById('timeline-section').style.display = '';
      document.getElementById('timeline-list').innerHTML = timeline.map((t, i) => `
        <div class="timeline-item">
          <div class="timeline-dot ${i > 0 ? 'muted' : ''}"></div>
          <div>
            <div style="font-weight:600">${t.title}</div>
            <div style="color:var(--text-muted);font-size:13px">${t.year}${t.sub ? ' · ' + t.sub : ''}</div>
          </div>
        </div>`).join('');
    } else {
      document.getElementById('timeline-section').style.display = 'none';
    }

    // ── Contact ───────────────────────────────────────────────────
    if (social.length) {
      document.getElementById('contact-links').innerHTML =
        social.map(s => `<a class="hero-link" href="${s.url}" target="_blank">${s.icon || ''} ${s.label}</a>`).join('');
    } else {
      document.getElementById('contact-section').style.display = 'none';
    }

    // ── Featured projects ─────────────────────────────────────────
    const featured = projects.filter(p => p.is_featured).slice(0, 3);
    document.getElementById('featured-projects').innerHTML = featured.length
      ? featured.map(p => `
          <div class="card">
            <div style="font-weight:600;margin-bottom:6px">${p.name}</div>
            <div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px">${p.description || ''}</div>
            <div style="margin-bottom:10px">${renderBadges(p.tech_stack)}</div>
            <div style="font-size:12px;color:var(--text-muted);display:flex;gap:12px">
              ${p.stars ? `<span>⭐ ${p.stars}</span>` : ''}
              ${p.repo_url ? `<a href="${p.repo_url}" target="_blank">GitHub →</a>` : ''}
            </div>
          </div>`).join('')
      : '<div class="empty">暂无精选项目</div>';

    // ── Latest posts ──────────────────────────────────────────────
    document.getElementById('latest-posts').innerHTML = posts.length
      ? posts.slice(0, 5).map(p => `
          <a href="/post.html?slug=${p.slug}" style="display:block;padding:14px 0;border-bottom:1px solid var(--border);text-decoration:none">
            <div style="font-size:15px;color:var(--text-primary);margin-bottom:4px">${p.title}</div>
            <div style="font-size:12px;color:var(--text-muted)">${new Date(p.created_at).toLocaleDateString('zh-CN')} · ${p.word_count} 字</div>
          </a>`).join('')
      : '<div class="empty">暂无文章</div>';
  </script>
</body>
</html>
