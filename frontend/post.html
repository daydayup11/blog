<!DOCTYPE html>
<html data-theme="dark" lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 | 戴宇彤</title>
  <script>
  (function(){var t=localStorage.getItem('blog-theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();
</script>
  <link rel="stylesheet" href="/css/theme-dark.css">
  <link rel="stylesheet" href="/css/theme-light.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <div id="nav-root"></div>

  <div style="max-width:1100px;margin:0 auto;padding:40px 24px;display:grid;grid-template-columns:1fr 200px;gap:40px" id="layout">
    <!-- Main -->
    <article>
      <div id="post-header"><div class="loading">加载中...</div></div>
      <div class="article-body" id="post-body"></div>
      <div id="post-nav" style="display:flex;justify-content:space-between;margin-top:40px;padding-top:20px;border-top:1px solid var(--border)"></div>
    </article>
    <!-- TOC sidebar -->
    <aside>
      <div class="toc" id="toc">
        <div class="section-title" style="margin-bottom:12px">目录</div>
        <div id="toc-links"></div>
      </div>
    </aside>
  </div>

  <script type="module">
    import { renderNav, renderTags, renderPostMeta, getApi } from '/js/components.js';
    import '/js/theme.js';

    document.getElementById('nav-root').innerHTML = renderNav('blog');

    // Switch hljs theme when light mode active
    const observer = new MutationObserver(() => {
      const dark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.getElementById('hljs-theme').href = dark
        ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
        : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
    });
    observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

    const slug = new URLSearchParams(location.search).get('slug');
    if (!slug) { document.getElementById('post-header').innerHTML = '<div class="empty">文章不存在</div>'; }

    const api = await getApi();
    const { post, views, reading_minutes, prev, next } = await api.getPost(slug);

    document.title = `${post.title} | 戴宇彤`;
    document.getElementById('post-header').innerHTML = `
      <h1 style="font-size:28px;font-weight:700;margin-bottom:16px;line-height:1.3">${post.title}</h1>
      ${renderPostMeta({ ...post, views, reading_minutes })}
      <div style="margin-top:12px">${renderTags(post.tags)}</div>
      <hr style="border:none;border-top:1px solid var(--border);margin:24px 0">`;

    document.getElementById('post-body').innerHTML = post.content_html;
    hljs.highlightAll();
    api.trackPost(post.id);
    api.trackPage(location.pathname, document.referrer);

    // Build TOC from h2/h3/h4 with multi-level indentation
    const headings = document.querySelectorAll('.article-body h2, .article-body h3, .article-body h4');
    if (headings.length) {
      const classMap = { H2: 'toc-h2', H3: 'toc-h3', H4: 'toc-h4' };
      document.getElementById('toc-links').innerHTML = [...headings].map(h => `
        <a href="#${h.id}" class="${classMap[h.tagName] || 'toc-h2'}">${h.textContent}</a>
      `).join('');
    } else {
      document.getElementById('toc').style.display = 'none';
      document.getElementById('layout').style.gridTemplateColumns = '1fr';
    }

    // Prev/Next navigation
    const params = new URLSearchParams(location.search);
    const columnSlug = params.get('column');
    const postNav = document.getElementById('post-nav');

    if (columnSlug) {
      try {
        const { column, posts: colPosts } = await api.getColumn(columnSlug);
        const idx = colPosts.findIndex(p => p.slug === slug);
        const prev = idx > 0 ? colPosts[idx - 1] : null;
        const next = idx < colPosts.length - 1 ? colPosts[idx + 1] : null;
        const colLink = `<a href="/column.html?slug=${columnSlug}"
          style="font-size:12px;color:var(--accent);display:block;margin-bottom:12px">
          ↑ 返回专栏：${column.name}
        </a>`;
        const prevHtml = prev
          ? `<a href="/post.html?slug=${prev.slug}&column=${columnSlug}"
              style="max-width:45%;text-decoration:none">
              <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">← 上一篇</div>
              <div style="font-size:14px;color:var(--text-primary)">${prev.title}</div>
            </a>`
          : '<div></div>';
        const nextHtml = next
          ? `<a href="/post.html?slug=${next.slug}&column=${columnSlug}"
              style="max-width:45%;text-align:right;text-decoration:none">
              <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">下一篇 →</div>
              <div style="font-size:14px;color:var(--text-primary)">${next.title}</div>
            </a>`
          : '<div></div>';
        postNav.innerHTML = `
          ${colLink}
          <div style="display:flex;justify-content:space-between;width:100%">
            ${prevHtml}${nextHtml}
          </div>`;
      } catch { /* no column nav if fetch fails */ }
    } else {
      // Global prev/next from API response
      const prevHtml = prev
        ? `<a href="/post.html?slug=${prev.slug}" style="max-width:45%;text-decoration:none">
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">← 上一篇</div>
            <div style="font-size:14px;color:var(--text-primary)">${prev.title}</div>
          </a>`
        : '<div></div>';
      const nextHtml = next
        ? `<a href="/post.html?slug=${next.slug}" style="max-width:45%;text-align:right;text-decoration:none">
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">下一篇 →</div>
            <div style="font-size:14px;color:var(--text-primary)">${next.title}</div>
          </a>`
        : '<div></div>';
      if (prev || next) {
        postNav.innerHTML = `<div style="display:flex;justify-content:space-between;width:100%">${prevHtml}${nextHtml}</div>`;
      }
    }

    // TOC scroll highlight
    const tocLinks = document.querySelectorAll('.toc a');
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          tocLinks.forEach(a => a.classList.remove('active'));
          const a = document.querySelector(`.toc a[href="#${e.target.id}"]`);
          if (a) a.classList.add('active');
        }
      });
    }, { rootMargin: '-20% 0px -70% 0px' });
    headings.forEach(h => io.observe(h));
  </script>
</body>
</html>
