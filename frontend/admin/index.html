<!DOCTYPE html>
<html data-theme="dark" lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 | 后台管理</title>
  <script>(function(){var t=localStorage.getItem('blog-theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="/css/theme-dark.css">
  <link rel="stylesheet" href="/css/theme-light.css">
  <link rel="stylesheet" href="/css/common.css">
  <style>
    .login-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-box  { width:360px; }
    .field       { margin-bottom:16px; }
    .field label { display:block; font-size:13px; color:var(--text-secondary); margin-bottom:6px; }
    .field input {
      width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:6px;
      background:var(--bg-card); color:var(--text-primary); font-size:14px; outline:none;
    }
    .field input:focus { border-color:var(--accent); }
    .btn-primary {
      width:100%; padding:10px; border:none; border-radius:6px;
      background:var(--accent); color:#000; font-size:14px; font-weight:600;
      cursor:pointer; margin-top:8px;
    }
    .btn-primary:hover { opacity:0.85; }
    .error { color:#f87171; font-size:13px; margin-top:8px; display:none; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <h1 style="font-size:22px;font-weight:700;margin-bottom:8px">后台登录</h1>
      <p style="color:var(--text-muted);font-size:13px;margin-bottom:24px">dyt 个人网站管理</p>
      <div class="field">
        <label>用户名</label>
        <input id="username" type="text" placeholder="admin" autocomplete="username">
      </div>
      <div class="field">
        <label>密码</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="login-btn">登录</button>
      <p class="error" id="error-msg">用户名或密码错误</p>
    </div>
  </div>

  <script type="module">
    import { api } from '/js/api.js';
    import '/js/theme.js';

    if (localStorage.getItem('admin-token')) {
      location.href = '/admin/dashboard.html';
    }

    async function doLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('login-btn').textContent = '登录中...';
      try {
        const { token } = await api.login(u, p);
        localStorage.setItem('admin-token', token);
        location.href = '/admin/dashboard.html';
      } catch {
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('login-btn').textContent = '登录';
      }
    }

    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
